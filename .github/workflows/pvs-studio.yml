name: PVS-Studio analysis
permissions: read-all

on:
  push:
    paths-ignore:
      - '.clang-format'
      - '.mdl-styles'
      - '*.md'
      - 'docs/**'
      - 'licenses/**'
      - 'website/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pvs_studio_analyzer:
    name: PVS-Studio static analyzer
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Set up CMake
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4

      - name: Load apt package list
        id:   apt_pkgs
        run:  echo "list=$(tr '\n' ' ' < extras/linux/ubuntu-24.04-packages.txt)" >> "$GITHUB_OUTPUT"

      - name: Refresh apt index
        run:  sudo apt-get update

      # Cache standard deps before configuring the PVS-Studio repo:
      # if that repo flakes, regular packages are still available.
      - name: Install apt dependencies
        id:   apt_cache
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: ${{ steps.apt_pkgs.outputs.list }}
          version:  "1.0"

      - name: Report apt cache status
        run:  echo "apt cache hit:" "${{ steps.apt_cache.outputs.cache-hit || 'false' }}"

      # PVS-Studio's external apt repo flakes. wget has native --tries;
      # apt-get uses ./.github/actions/retry. cache-apt-pkgs-action
      # doesn't help -- the repo isn't a standard PPA.
      - name: Fetch PVS-Studio apt key and sources list
        run: |
          set -xeu
          wget -q --tries=3 --waitretry=10 -O - https://files.pvs-studio.com/etc/pubkey.txt | sudo apt-key add -
          sudo wget --tries=3 --waitretry=10 -O /etc/apt/sources.list.d/viva64.list https://files.pvs-studio.com/etc/viva64.list

      - name: Refresh apt index (PVS-Studio repo)
        uses: ./.github/actions/retry
        with:
          cmd: sudo apt-get update

      - name: Install PVS-Studio
        uses: ./.github/actions/retry
        with:
          cmd: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y pvs-studio

      - name: Set up vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          name_os: pvs
          arch: "x64"
          compiler: "gcc"

      - name: Log environment
        run:  ./scripts/ci/log-env.sh

      - name: Configure PVS-Studio license
        run: |
          set -xeu
          pvs-studio-analyzer credentials "${{ secrets.PvsStudioName }}" "${{ secrets.PvsStudioKey }}"

      - name: Build
        run: |
          set -x
          export CC=clang
          export CXX=clang++
          cmake --preset debug-linux-vcpkg -DOPT_TESTS=OFF

          # TODO Consider using the the PV-Studio CMake integration instead
          # of calling the `pvs-studio-analyzer` directly. That might be a
          # more maintainable approach, but needs further investigation.
          # More info:
          # - https://pvs-studio.com/en/docs/manual/0036/
          # - https://github.com/viva64/pvs-studio-cmake-examples
          #
          pvs-studio-analyzer trace -- cmake --build --preset debug-linux-vcpkg

      - name: Analyze
        run: |
          set -xeu
          log="pvs-report.log"
          general_criteria="GA:1,2;64:1;OP:1,2,3;CS:1"
          stamp="$(date +'%Y-%m-%d_T%H%M')-${GITHUB_SHA:0:8}"
          reportdir="pvs-report/pvs-report-${stamp}"
          disable_warnings="V002,V801,V802,V813,V826,V1042,V1071,V2008,V2010"

          mkdir -p "${reportdir}"

          pvs-studio-analyzer analyze \
            -a '64;GA;OP;CS;MISRA' \
            -e subprojects -e src/libs \
            -s .pvs-suppress \
            -j "$(nproc)" \
            -o "${log}"

          plog-converter \
            -p dosbox-staging \
            -v "${GITHUB_SHA:0:8}" \
            -a "${general_criteria}" \
            -d "${disable_warnings}" \
            -t fullhtml,csv \
            -o "${reportdir}" \
            "${log}"

          pvs-studio-analyzer suppress \
            -a "${general_criteria}" \
            -o "${reportdir}/supressible-list.json" \
            "${log}"

          ln -sf "${reportdir}/pvs-report.csv" .
          mv -f "${reportdir}/pvs-report.fullhtml"/* "${reportdir}/"
          rm -rf "${reportdir}/pvs-report.fullhtml"

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: pvs-analysis-report
          path: pvs-report
          overwrite: true

      - name: Summarize report
        env:
          MAX_BUGS: 0
        run: |
          echo "Full report is included in build Artifacts"
          echo
          ./scripts/ci/count-pvs-bugs.py "pvs-report.csv" "${MAX_BUGS}"
