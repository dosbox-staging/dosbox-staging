name: Deploy website
permissions: read-all

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch to deploy the website from (last release/* branch for current version)'
        required: true
        default: 'release/0.83.x'
        type: string

      destination_prefix:
        description: 'Deploy to this path prefix (leave empty for the current version)'
        type: string

  workflow_call:
    inputs:
      source_branch:
        description: 'Branch to deploy the website from'
        required: true
        type: string

      destination_prefix:
        description: 'Deploy to this path prefix (leave empty for the current version)'
        type: string

jobs:
  linting:
    uses: ./.github/workflows/linting.yml

  build_and_deploy_website:
    needs: linting
    # linting.yml's own `if:` skips it on same-repo PRs (it's already run on
    # push). Without this guard the dependent job would be skipped too,
    # cascading to skip the deploy when called via workflow_call from a PR.
    if: ${{ always() && (needs.linting.result == 'success' || needs.linting.result == 'skipped') }}
    runs-on: ubuntu-slim
    steps:
      - name: Check out MkDocs sources
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch }}
          submodules: false
          path: dosbox-staging

      - name: Check out organisation GitHub Pages repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN_REPO }}
          repository: dosbox-staging/dosbox-staging.github.io
          ref: master
          submodules: false
          path: dosbox-staging.github.io

      - name: Set up variables
        run: |
          if [[ -z "${{ inputs.destination_prefix }}" ]]; then
            echo "dest_path_prefix=." >> "$GITHUB_ENV"
          else
            echo "dest_path_prefix=preview/${{ inputs.destination_prefix }}" >> "$GITHUB_ENV"
          fi

      - name: Install mkdocs
        run: |
          cd dosbox-staging
          pip3 install --upgrade pip
          pip3 install -r extras/documentation/mkdocs-package-requirements.txt

      - name: Get current documentation Git hash
        run: |
          cd dosbox-staging
          REV=$(git rev-parse --short HEAD)
          echo "source_git_hash=$REV" >> "$GITHUB_ENV"

      - name: Delete existing documentation
        run: |
          cd dosbox-staging.github.io
          if [[ -d ${{ env.dest_path_prefix }} ]]; then
              cd ${{ env.dest_path_prefix }}
              FILES=$(find . \
                  -not -path '*/\.*'        `# ignore hidden files` \
                  -not -path "."            `# ignore current dir` \
                  -not -path "./static"     `# ignore manually managed 'static' dir` \
                  -not -path "./static/*"   `# ignore manually managed 'static' dir contents` \
                  -not -path "./tools"      `# ignore manually managed 'tools' dir` \
                  -not -path "./tools/*"    `# ignore manually managed 'tools' dir contents` \
                  -not -path "./preview"    `# ignore 'preview' dir` \
                  -not -path "./preview/*"  `# ignore 'preview' dir contents` \
                  -not -path "./README.md"  `# ignore 'README.md'` \
                  -not -path "./CNAME"      `# ignore 'CNAME'` \
                  -not -path "./0.82"       `# ignore earlier documentation versions` \
                  -not -path "./0.82/*"
              )
              echo $FILES | xargs git rm -rf --
          fi

      - name: Build documentation
        run: |
          cd dosbox-staging.github.io
          MKDOCS_SRC_PATH=../dosbox-staging/website/
          TEMP_PATH=$(pwd)/temp-out
          DEST_PATH=$(pwd)/${{ env.dest_path_prefix }}

          mkdocs build --config-file $MKDOCS_SRC_PATH/mkdocs.yml --site-dir $TEMP_PATH
          mkdir -p $DEST_PATH
          cp -rf $TEMP_PATH/* $DEST_PATH
          rm -rf $TEMP_PATH
          touch $DEST_PATH/.nojekyll

      - name: Set up Git config
        run: |
          cd dosbox-staging.github.io
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"

      - name: Commit & publish new release
        run: |
          cd dosbox-staging.github.io
          git add .
          git add .nojekyll
          # Skip if the rebuilt site is byte-identical (e.g. a PR push that
          # only changed non-website files but the PR overall touches
          # website/**, so the workflow still fires).
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Deployed current website (${{ env.source_git_hash }})"
          # Retry on non-fast-forward: a cancelled sibling run (cancel-in-progress
          # is not synchronous) may land its push between our checkout and ours.
          for i in 1 2 3; do
            git push && break
            git pull --rebase
          done

